name: Build Debug APKs

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 21.4.7075529
        run: yes | sdkmanager "ndk;21.4.7075529" || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APKs
        run: ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: VirtualApp-universal
          path: app/build/outputs/apk/debug/*-universal.apk
          retention-days: 14

      - name: Upload 64-bit (arm64-v8a) APK
        uses: actions/upload-artifact@v4
        with:
          name: VirtualApp-arm64-v8a
          path: app/build/outputs/apk/debug/*-arm64-v8a.apk
          retention-days: 14

      - name: Upload 32-bit (armeabi-v7a) APK
        uses: actions/upload-artifact@v4
        with:
          name: VirtualApp-armeabi-v7a
          path: app/build/outputs/apk/debug/*-armeabi-v7a.apk
          retention-days: 14
